<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제휴 문의</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="테마 전환">☀️</button>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h1>제휴 문의</h1>
      <p class="subtitle">파트너십 및 제휴 관련 문의를 남겨주세요.<br>빠른 시일 내에 답변 드리겠습니다.</p>
    </div>

    <form id="contactForm" action="https://formspree.io/f/mnjgdrkq" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label for="company">회사명 <span class="required">*</span></label>
          <input type="text" id="company" name="company" placeholder="(주)회사명" required>
        </div>
        <div class="form-group">
          <label for="name">담당자명 <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">이메일 <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="example@company.com" required>
        </div>
        <div class="form-group">
          <label for="phone">연락처</label>
          <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
        </div>
      </div>

      <div class="form-group">
        <label for="category">문의 유형 <span class="required">*</span></label>
        <select id="category" name="category" required>
          <option value="" disabled selected>선택해 주세요</option>
          <option value="광고/마케팅">광고 / 마케팅</option>
          <option value="콘텐츠 제휴">콘텐츠 제휴</option>
          <option value="기술 협력">기술 협력</option>
          <option value="투자/IR">투자 / IR</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">문의 내용 <span class="required">*</span></label>
        <textarea id="message" name="message" rows="5" placeholder="제휴 목적 및 내용을 자유롭게 적어주세요." required></textarea>
      </div>

      <div class="form-footer">
        <p class="privacy-note">* 수집된 정보는 문의 답변 목적으로만 사용됩니다.</p>
        <button type="submit" class="btn-submit" id="submitBtn">
          <span id="btnText">문의 보내기</span>
          <span id="btnSpinner" class="spinner" style="display:none"></span>
        </button>
      </div>
    </form>

    <div id="successMsg" class="success-msg" style="display:none">
      <div class="success-icon">✅</div>
      <h2>문의가 접수되었습니다!</h2>
      <p>담당자 확인 후 이메일로 연락 드리겠습니다.</p>
      <button class="btn-reset" onclick="resetForm()">새 문의 작성</button>
    </div>
  </div>
</div>

<script src="contact.js"></script>
</body>
</html>
